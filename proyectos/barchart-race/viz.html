<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bar Chart Race — Tráfico Aéreo Internacional Chile</title>
  <link rel="stylesheet" href="assets/css/barchart.css">
</head>
<body>
  <div class="container">
    <div class="controls">
      <div class="toggle-group" id="perspectiva-toggle" role="group" aria-label="Perspectiva">
        <button class="active" data-value="emisivo" aria-pressed="true">Emisivo</button>
        <button data-value="receptivo" aria-pressed="false">Receptivo</button>
      </div>
      <div class="toggle-group" id="dimension-toggle" role="group" aria-label="Dimensión">
        <button class="active" data-value="destinos" id="dim-destinos" aria-pressed="true">Destinos</button>
        <button data-value="aerolinea" aria-pressed="false">Aerolínea</button>
      </div>
      <div class="toggle-group" id="metrica-toggle" role="group" aria-label="Métrica">
        <button class="active" data-value="pasajeros" aria-pressed="true">Pasajeros</button>
        <button data-value="tonelaje" aria-pressed="false">Tonelaje</button>
      </div>
      <div class="playback">
        <button id="btn-play" aria-label="Reproducir animación">&#9654; Play</button>
        <label for="year-slider" class="sr-only">Año</label>
        <input type="range" id="year-slider" min="0" max="1" value="0" step="1">
        <span id="year-label" aria-live="polite">—</span>
      </div>
    </div>

    <div class="chart-wrapper">
      <div id="chart" role="img" aria-label="Bar chart race: visualización animada del tráfico aéreo internacional de Chile"></div>
      <div class="annotation-banner" id="annotation-banner"></div>
    </div>

  </div>

  <script src="https://d3js.org/d3.v7.min.js"></script>
  <script src="assets/js/barchart-race.js"></script>
</body>
</html>
