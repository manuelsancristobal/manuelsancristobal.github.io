<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inversión Apalancada - Simulación Monte Carlo</title>
    <link rel="stylesheet" href="assets/css/inversion.css" />
  </head>
  <body>
    <div class="container">
      <h1>Inversión Apalancada: Simulación Monte Carlo</h1>

      <!-- Controles -->
      <div class="controls">
        <div class="strategy-toggles">
          <label>
            <input type="checkbox" data-strategy="agresivo_apalancado" checked />
            Agresivo Apalancado
          </label>
          <label>
            <input type="checkbox" data-strategy="agresivo_sin_apalancamiento" checked />
            Agresivo Sin Apalancamiento
          </label>
          <label>
            <input type="checkbox" data-strategy="moderado_apalancado" checked />
            Moderado Apalancado
          </label>
          <label>
            <input type="checkbox" data-strategy="moderado_sin_apalancamiento" checked />
            Moderado Sin Apalancamiento
          </label>
        </div>

        <div class="playback">
          <button id="btn-play" aria-label="Reproducir animación">▶ Play</button>
          <label for="month-slider" class="sr-only">Mes</label>
          <input type="range" id="month-slider" min="0" max="60" value="0" step="1" />
          <span id="month-label" aria-live="polite">Mes 0</span>
        </div>
      </div>

      <!-- Área del gráfico -->
      <div class="chart-wrapper">
        <div id="chart" role="img" aria-label="Simulacion Monte Carlo de estrategias de inversion"></div>
        <div id="stats-panel" class="stats-panel"></div>
      </div>

    </div>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="assets/js/inversion-apalancada.js"></script>
  </body>
</html>
