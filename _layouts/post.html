---
layout: default
---

<article class="post-container">
    <header class="post-header" style="margin-bottom: 2rem; border-bottom: 1px solid #eee; padding-bottom: 1rem;">
        <span class="post-date" style="color: var(--secondary); font-weight: 700; font-size: 0.9rem;">{{ page.date | date: "%B %d, %Y" }}</span>
        <h1 style="color: #ffffff; font-size: 2.5rem; margin-top: 0.5rem; font-weight: 700;">{{ page.title }}</h1>
    </header>

    <div class="post-content" style="font-size: 1.1rem; line-height: 1.8; color: #333;">
        {{ content }}
    </div>

    <footer class="post-footer" style="margin-top: 4rem; padding-top: 2rem; border-top: 1px solid #eee;">
        <a href="{{ '/english-talks.html' | relative_url }}" class="btn-back" style="text-decoration: none; color: var(--secondary); font-weight: 600;">
            <i class="fas fa-arrow-left"></i> Back to Timeline
        </a>
    </footer>
</article>
